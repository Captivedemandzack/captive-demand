# Long-lived caching for static assets in /public.
# Next.js's `headers()` config does NOT apply to /public files on Netlify -
# those bypass the Next runtime. Lighthouse "Use efficient cache lifetimes"
# fires without these.
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

